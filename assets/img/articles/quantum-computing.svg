<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Abstract quantum computing illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2f7fc"/>
      <stop offset="1" stop-color="#dce8f4"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#35608e"/>
      <stop offset="1" stop-color="#5f86ad"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#35608e" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#35608e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="600" cy="338" r="300" fill="url(#glow)"/>

  <!-- faint dotted grid -->
  <g fill="#35608e" opacity="0.10">
    <!-- generated dot field -->
    <g>
      <circle cx="120" cy="110" r="3"/><circle cx="240" cy="110" r="3"/><circle cx="360" cy="110" r="3"/>
      <circle cx="960" cy="150" r="3"/><circle cx="1080" cy="150" r="3"/><circle cx="1080" cy="270" r="3"/>
      <circle cx="150" cy="540" r="3"/><circle cx="270" cy="540" r="3"/><circle cx="1050" cy="520" r="3"/>
    </g>
  </g>

  <!-- orbital rings (quantum motif) -->
  <g fill="none" stroke="url(#stroke)" stroke-width="2.5" opacity="0.75">
    <ellipse cx="600" cy="338" rx="250" ry="96"/>
    <ellipse cx="600" cy="338" rx="250" ry="96" transform="rotate(60 600 338)"/>
    <ellipse cx="600" cy="338" rx="250" ry="96" transform="rotate(120 600 338)"/>
  </g>

  <!-- nucleus -->
  <circle cx="600" cy="338" r="26" fill="#35608e"/>
  <circle cx="600" cy="338" r="26" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6"/>

  <!-- electrons / qubits -->
  <g fill="#2c5079">
    <circle cx="850" cy="338" r="12"/>
    <circle cx="475" cy="122" r="12"/>
    <circle cx="475" cy="554" r="12"/>
  </g>
  <g fill="#5f86ad">
    <circle cx="350" cy="338" r="9"/>
    <circle cx="725" cy="554" r="9"/>
    <circle cx="725" cy="122" r="9"/>
  </g>
</svg>
